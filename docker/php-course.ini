; Ajustes de PHP para el contenedor del curso.
; Sin un temp válido, las sesiones de CI3 y TCPDF fallan (mkdir(): Invalid path).
session.save_path = "/tmp"
sys_temp_dir = "/tmp"
upload_tmp_dir = "/tmp"
date.timezone = "Europe/Madrid"
memory_limit = 512M

; --- Subidas grandes (visor-3d: modelos 3D de cientos de MB) ---
; upload_max_filesize: tamaño máx. de cada archivo.  post_max_size debe ser mayor (deja margen
; para el resto del formulario). max_input_time/max_execution_time: tiempo para recibir/procesar.
upload_max_filesize = 1024M
post_max_size = 1056M
max_input_time = 600
max_execution_time = 600
